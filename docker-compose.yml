version: '3.8'

services:
  backend:
    build: ./backend-node
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://db:27017/medcore
      - PORT=8000
      - JWT_SECRET=your-secret-key-here
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

